<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do</title>

  <style>
    :root {
      --bg: #f9f9f9;
      --paper-dark: #eeeeee;
      --ink: #111;
      --ink-light: #555;
      --ink-faint: #ccc;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 20px;
    }

    /* HEADER /
    .page-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header-controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .control-slot {
      background: var(--paper-dark);
      border: 1px solid var(--ink-faint);
      border-radius: 12px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    / THEME TOGGLE /
    .theme-toggle {
      width: 44px;
      height: 26px;
      border-radius: 13px;
      border: 1px solid var(--ink-faint);
      background: var(--bg);
      display: flex;
      align-items: center;
      padding: 0 2px;
      cursor: pointer;
    }

    / TOMORROW BUTTON /
    .tomorrow-toggle {
      border: none;
      background: transparent;
      font-size: 14px;
      cursor: pointer;
    }

    / INPUT /
    .add-input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--ink-faint);

      / 🔥 FIX FOR IPHONE ZOOM /
      font-size: 16px;
    }

    / DESKTOP SIZE ADJUST */
    @media (min-width: 768px) {
      .add-input {
        font-size: 14px;
      }
    }

  </style>
</head>

<body>

  <header class="page-header">
    <div class="header-controls">
      <div class="control-slot">
        <button class="theme-toggle" id="theme-toggle">
          ☀️
        </button>
      </div>

      <div class="control-slot">
        <button class="tomorrow-toggle" id="tomorrow-toggle">
          Tomorrow's List
        </button>
      </div>
    </div>

    <h1>Daily To-Do List</h1>
  </header>

  <input class="add-input" placeholder="Add a task..." />

  <script>
    const toggle = document.getElementById("theme-toggle");

    toggle.addEventListener("click", () => {
      document.body.classList.toggle("dark");
    });
  </script>

</body>
</html>
